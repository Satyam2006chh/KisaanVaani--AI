services:
  - type: web
    name: kisaanvaani-backend
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDirectory: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: APP_ENV
        value: production
